group_channels_by_category:
  type: bool
  default: true
  description: "Group chat channels by their parent category in the sidebar"

show_category_color:
  type: bool
  default: true
  description: "Show category color indicator next to category headers"

collapse_categories_by_default:
  type: bool
  default: false
  description: "Start with all category groups collapsed"

category_name_overrides:
  type: list
  default: ""
  description: "Remap category display names. Format: Original Name:Display Name"

category_sort_order:
  type: list
  default: ""
  description: "Custom category order. List category names in desired order. Unlisted categories appear at the end alphabetically."
